# Staging-specific overrides
namespace: vendor-staging

ingress:
  enabled: true
  host: vendor-demo.shawnlin.online

env:
  - name: DB_URL
    valueFrom:
      secretKeyRef:
        name: shared-db
        key: url
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: shared-redis
        key: url
  - name: TZ
    value: "Asia/Taipei"
