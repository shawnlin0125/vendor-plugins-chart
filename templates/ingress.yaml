{{- if .Values.ingress.enabled }}
{{- range .Values.plugins }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "vendor-plugins.fullname" . }}-ingress
  namespace: {{ $.Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: {{ $.Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vendor-plugins.fullname" . }}
                port:
                  number: 80
{{- end }}
{{- end }}
